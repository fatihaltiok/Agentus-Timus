version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: timus-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_db:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  timus:
    build: .
    container_name: timus
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data          # SQLite DBs, token cache
      - ./memory:/app/memory      # SOUL.md, USER.md, MEMORY.md
      - ./docs:/app/docs          # research reports + PDFs
      - ./.env:/app/.env:ro       # secrets (read-only)
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
